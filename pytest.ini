[pytest]
markers =
    fast: tests that run quickly (<1s)
    slow: tests that run slower (1-60s)
    integration: integration tests that need more mocking
    unit: unit tests with no dependencies

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Basic test configuration
addopts =
    -v
    --tb=short
    --timeout=30